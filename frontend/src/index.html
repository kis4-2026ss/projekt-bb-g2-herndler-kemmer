<html>

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple RAG User Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-5">
        <h1>Simple RAG User Interface</h1>
        <p>This is a simple user interface to prompt the underlying database using natural language queries.</p>
        <form id="prompForm">
            <textarea id="queryInput" class="form-control" rows="3" placeholder="Enter your query here... (Shift+Enter to submit)"></textarea>
            <div class="d-flex align-items-center gap-2">
                <button id="submitQuery" class="btn btn-primary mt-3">Submit Query</button>
                <div id="loadingSpinner" class="mt-3" style="display: none;">
                    <div class="spinner-border spinner-border-sm text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </form>

        <div id="responseContainer" class="mt-4">
            <p class="form-control" id="responseText" style="white-space: pre-wrap; word-wrap: break-word;"></p>
        </div>
        <hr/>

        <div id="usedSqlQueryContainer" class="mt-4 " style="display: none">
            <label for="usedSqlQuery" class="form-label badge bg-secondary">Used SQL Query</label>
            <p id="usedSqlQuery" class="text-muted" style="white-space: pre-wrap; word-wrap: break-word;"></p>
        </div>

        <div id="rawResultsContainer" class="mt-4 " style="display: none">
            <label for="rawResults" class="form-label badge bg-secondary">Raw Results</label>
            <div class="table-responsive">
                <table id="rawResults" class="table table-striped table-hover">
                    <thead>
                        <tr id="tableHeader"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <script src="js/app.js" type="module"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
            integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
            crossorigin="anonymous"></script>
    </div>
</body>

</html>
